<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>돈을 모으쟈</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:40px 16px;display:flex;justify-content:center;}
    .container{width:100%;max-width:640px;}

    /* 헤더 */
    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
    .page-title{font-size:17px;font-weight:500;}
    .save-indicator{font-size:11px;color:#bbb;display:flex;align-items:center;gap:5px;}
    .save-dot{width:6px;height:6px;border-radius:50%;background:#bbb;display:inline-block;}
    .save-dot.saved{background:#4caf7d;}

    /* 월 탭 */
    .month-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;}
    .month-tabs::-webkit-scrollbar{display:none;}
    .month-tab{padding:6px 14px;border-radius:999px;border:0.5px solid #ddd;background:#fff;font-size:13px;color:#888;cursor:pointer;white-space:nowrap;flex-shrink:0;}
    .month-tab:hover{border-color:#aaa;color:#555;}
    .month-tab.active{background:#1a1a1a;border-color:#1a1a1a;color:#fff;font-weight:500;}

    /* 이전 달 배너 */
    .past-banner{display:none;justify-content:space-between;align-items:center;padding:10px 16px;background:#fffbe6;border:0.5px solid #ffe082;border-radius:10px;margin-bottom:14px;font-size:13px;color:#8a6d00;}
    .past-banner button{font-size:12px;font-weight:500;color:#8a6d00;background:none;border:none;cursor:pointer;text-decoration:underline;}

    /* 메인 탭 */
    .main-tabs{display:flex;gap:0;margin-bottom:20px;background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:4px;overflow:hidden;}
    .main-tab{flex:1;padding:9px;text-align:center;font-size:14px;color:#aaa;cursor:pointer;border-radius:9px;transition:background .15s,color .15s;}
    .main-tab.active{background:#1a1a1a;color:#fff;font-weight:500;}

    /* 공통 카드 스타일 */
    .section{margin-bottom:12px;}
    .section-label{font-size:11px;color:#aaa;letter-spacing:.4px;text-transform:uppercase;margin-bottom:8px;padding-left:2px;}
    .card{background:#fff;border:0.5px solid #e0e0e0;border-radius:14px;padding:18px 20px;}

    /* 수입 & 고정지출 */
    .income-row{display:flex;gap:8px;}
    .income-wrap{flex:1;position:relative;}
    .income-wrap span{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;color:#bbb;}
    .income-wrap input{width:100%;padding:11px 12px 11px 28px;border:0.5px solid #ddd;border-radius:10px;font-size:16px;font-weight:500;outline:none;background:#fafafa;}
    .income-wrap input:focus{background:#fff; border-color:#aaa;}
    .go-btn{padding:11px 20px;border-radius:10px;border:none;background:#1a1a1a;color:#fff;font-size:14px;font-weight:500;cursor:pointer;}
    .available-row{display:none;justify-content:space-between;align-items:center;padding:11px 16px;background:#f0f9f4;border:0.5px solid #c6e8d4;border-radius:10px;margin-top:10px;font-size:13px;color:#2d7a50;}

    .fixed-item{display:grid;grid-template-columns:1fr 110px 28px;gap:8px;margin-bottom:8px;}
    .fixed-input{width:100%;padding:8px 10px;border:0.5px solid #e8e8e8;border-radius:8px;font-size:13px;outline:none;background:#fafafa;}
    .icon-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:0.5px solid #e8e8e8;border-radius:7px;background:none;color:#ccc;cursor:pointer;}
    .icon-btn:hover{color:#e05a2b; border-color:#e05a2b;}

    /* 봉투 디자인 */
    .envelopes{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
    @media(min-width:480px){.envelopes{grid-template-columns:repeat(4,minmax(0,1fr));}}
    .envelope{background:#fff;border:0.5px solid #e0e0e0;border-radius:11px;overflow:hidden;}
    .env-flap svg{display:block;width:100%;}
    .env-body{padding:8px 10px 14px;display:flex;flex-direction:column;align-items:center;gap:3px;}
    .env-name-input{font-size:11px;color:#999;text-align:center;border:none;background:transparent;outline:none;width:100%;}
    .env-amt-input{width:95%; border:none; border-bottom:1.5px solid #f0f0f0; background:transparent; font-size:15px; font-weight:700; text-align:center; padding:2px 0; outline:none; color:#1a1a1a;}

    /* 저축 패널 */
    .save-panel{margin-top:10px;background:#fff;border:0.5px solid #1a1a1a;border-radius:14px;padding:18px 20px;display:none;}
    .save-panel.open{display:block;}
    .panel-header{display:flex;justify-content:space-between;margin-bottom:16px;font-size:13px;font-weight:500;}

    /* 슬라이더 */
    .sl-row{display:grid;grid-template-columns:68px 1fr 45px;gap:10px;align-items:center;margin-bottom:11px;font-size:13px;}
    input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:#ebebeb;outline:none;border-radius:2px;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#1a1a1a;cursor:pointer;}

    /* 남은 돈 UI 복구 */
    .leftover-item{display:grid;grid-template-columns:1fr 110px;gap:8px;align-items:center;margin-bottom:8px;}
    .leftover-label{font-size:13px;color:#666;}
    .leftover-input{width:100%;padding:8px 10px;border:0.5px solid #e8e8e8;border-radius:8px;font-size:13px;color:#1a1a1a;background:#fafafa;outline:none;text-align:right;}
    .merge-row{display:flex;justify-content:space-between;align-items:center;padding-top:12px;margin-top:10px;border-top:0.5px solid #f0f0f0;}
    .merge-btn{padding:8px 16px;border-radius:8px;border:0.5px solid #1a1a1a;background:transparent;color:#1a1a1a;font-size:13px;font-weight:500;cursor:pointer;}
    .merge-btn:hover{background:#1a1a1a;color:#fff;}

    /* ─── 기록 탭 UI 복구 ─── */
    .record-env-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;}
    .record-env-tabs::-webkit-scrollbar{display:none;}
    .record-env-tab{padding:7px 16px;border-radius:999px;border:0.5px solid #ddd;background:#fff;font-size:13px;color:#888;cursor:pointer;white-space:nowrap;flex-shrink:0;}
    .record-env-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500;}

    .budget-bar-wrap{margin-bottom:16px;}
    .budget-bar-labels{display:flex;justify-content:space-between;font-size:12px;color:#aaa;margin-bottom:5px;}
    .budget-bar-labels strong{color:#1a1a1a; font-size:13px;}
    .budget-bar-bg{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;}
    .budget-bar-fill{height:100%;background:#1a1a1a;transition:width .3s;border-radius:3px;}
    .budget-bar-fill.over{background:#e05a2b;}
    .over-label{color:#e05a2b !important;}

    .spend-add-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:14px;padding:16px 18px;margin-bottom:12px;}
    .spend-row-input{display:grid;grid-template-columns:1fr 100px;gap:8px;margin-bottom:8px;}
    .spend-row-input2{display:grid;grid-template-columns:1fr 1fr 28px;gap:8px;align-items:center;}
    .spend-input{width:100%;padding:9px 10px;border:0.5px solid #e8e8e8;border-radius:8px;font-size:13px;outline:none;background:#fafafa;}
    .spend-input:focus{border-color:#aaa;background:#fff;}
    .spend-add-btn{width:28px;height:28px;background:#1a1a1a;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:17px;}

    .spend-list-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:14px;padding:16px 18px;}
    .spend-item{display:grid;grid-template-columns:52px 1fr auto 28px;gap:8px;align-items:center;padding:9px 0;border-bottom:0.5px solid #f5f5f5;}
    .spend-item:last-child{border-bottom:none;}
    .spend-date{font-size:12px;color:#bbb;}
    .spend-info{display:flex;flex-direction:column;gap:2px;}
    .spend-note-text{font-size:13px;color:#1a1a1a;}
    .spend-cat-badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:500;}
    .spend-amount{font-size:14px;font-weight:500;color:#1a1a1a;text-align:right;}

    .chart-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:14px;padding:16px 18px;margin-top:12px;margin-bottom:12px;}
    .chart-wrap{display:flex;align-items:center;gap:20px;}
    .legend{display:flex;flex-direction:column;gap:7px;flex:1;}
    .legend-item{display:flex;align-items:center;gap:8px;font-size:13px;}
    .legend-dot{width:9px;height:9px;border-radius:50%;}

    .reset-btn{font-size:11px;color:#ccc;background:none;border:none;cursor:pointer;padding:24px;width:100%;text-align:center;}
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyBsDuY3FLmvXmsIgZgmtCu79eondhZfy_k",
      authDomain: "money-get-d3451.firebaseapp.com",
      projectId: "money-get-d3451",
      storageBucket: "money-get-d3451.firebasestorage.app",
      messagingSenderId: "692925819247",
      appId: "1:692925819247:web:e59b179a502c4f456f609a"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window._db = db; window._dbReady = true;
    window.dispatchEvent(new Event('db-ready'));
  </script>
</head>
<body>
<div class="container">
  <div class="page-header">
    <p class="page-title">돈을 모으쟈</p>
    <span class="save-indicator"><span class="save-dot" id="save-dot"></span><span id="save-label">저장 안 됨</span></span>
  </div>

  <div class="month-tabs" id="month-tabs"></div>

  <div class="past-banner" id="past-banner">
    <span id="past-text"></span>
    <button onclick="goCurrentMonth()">이번 달로 돌아가기</button>
  </div>

  <div class="main-tabs">
    <div class="main-tab active" id="tab-budget" onclick="switchMainTab('budget')">예산</div>
    <div class="main-tab" id="tab-record" onclick="switchMainTab('record')">기록</div>
  </div>

  <!-- 예산 탭 -->
  <div id="view-budget">
    <div class="section">
      <div class="section-label">수입</div>
      <div class="card">
        <div class="income-row">
          <div class="income-wrap"><span>₩</span><input type="number" id="income" placeholder="이번 달 수입" oninput="calculate();saveData();"/></div>
          <button class="go-btn" onclick="calculate()">분배</button>
        </div>
        <div class="available-row" id="available-row"><span>봉투에 넣을 돈</span><strong id="available-amt">0원</strong></div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">고정 지출</div>
      <div class="card">
        <div id="fixed-list"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; border-top:0.5px solid #f0f0f0; padding-top:12px;">
          <button style="font-size:12px; color:#aaa; background:none; border:none; cursor:pointer;" onclick="addFixed()">+ 항목 추가</button>
          <span id="fixed-sum" style="font-size:12px; color:#e05a2b; font-weight:500;">합계 0원</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">봉투 (금액 입력 시 자동 배분)</div>
      <div class="envelopes" id="envelopes"></div>
      <div class="save-panel" id="save-panel">
        <div class="panel-header"><span>저축 세부 목표</span><strong id="save-total-amt"></strong></div>
        <div id="goal-list"></div>
        <button style="font-size:12px; color:#aaa; background:none; border:none; cursor:pointer; margin-top:12px;" onclick="addGoal()">+ 목표 추가</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">비율 조정</div>
      <div class="card">
        <div id="slider-rows"></div>
        <div style="display:flex; justify-content:space-between; margin-top:11px; border-top:0.5px solid #f0f0f0; padding-top:11px; font-size:12px;">
          <span style="color:#bbb;">합계</span><strong id="total-pct">100.0%</strong>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">월말 남은 돈 → 저축 합산</div>
      <div class="card">
        <div id="leftover-rows"></div>
        <div class="merge-row">
          <span style="font-size:12px; color:#aaa;">합산 금액 <strong id="merge-sum" style="color:#1a1a1a;">0원</strong></span>
          <button class="merge-btn" onclick="mergeLeftover()">저축에 합산</button>
        </div>
        <div id="merge-result" style="display:none; margin-top:10px; padding:10px; background:#f0f9f4; border:0.5px solid #c6e8d4; border-radius:8px; font-size:13px; color:#2d7a50;"></div>
      </div>
    </div>
  </div>

  <!-- 기록 탭 (UI 복구 완료) -->
  <div id="view-record" style="display:none;">
    <div class="record-env-tabs" id="record-env-tabs"></div>
    <div id="record-content"></div>
  </div>

  <button class="reset-btn" onclick="resetAll()">초기화</button>
</div>

<!-- PIN 스크린 -->
<div id="pin-screen" style="display:none;position:fixed;inset:0;background:#f5f5f3;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;">
  <p style="font-size:17px;font-weight:500;">PIN 입력</p>
  <div style="display:flex;gap:12px;">
    <div style="width:14px;height:14px;border-radius:50%;border:1.5px solid #ccc;" id="dot-0"></div>
    <div style="width:14px;height:14px;border-radius:50%;border:1.5px solid #ccc;" id="dot-1"></div>
    <div style="width:14px;height:14px;border-radius:50%;border:1.5px solid #ccc;" id="dot-2"></div>
    <div style="width:14px;height:14px;border-radius:50%;border:1.5px solid #ccc;" id="dot-3"></div>
  </div>
  <p style="font-size:12px;color:#e05a2b;min-height:18px;" id="pin-error"></p>
  <div style="display:grid;grid-template-columns:repeat(3,72px);gap:10px;">
    <button onclick="window.pinInput('1')" style="height:72px;border-radius:50%;border:0.5px solid #ddd;background:#fff;font-size:22px;">1</button>
    <button onclick="window.pinInput('2')" style="height:72px;border-radius:50%;border:0.5px solid #ddd;background:#fff;font-size:22px;">2</button>
    <button onclick="window.pinInput('3')" style="height:72px;border-radius:50%;border:0.5px solid #ddd;background:#fff;font-size:22px;">3</button>
    <button onclick="window.pinInput('4')" style="height:72px;border-radius:50%;border:0.5px solid #ddd;background:#fff;font-size:22px;">4</button>
    <button onclick="window.pinInput('5')" style="height:72px;border-radius:50%;border:0.5px solid #ddd;background:#fff;font-size:22px;">5</button>
    <button onclick="window.pinInput('6')" style="height:72px;border-radius:50%;border:0.5px solid #ddd;background:#fff;font-size:22px;">6</button>
    <button onclick="window.pinInput('7')" style="height:72px;border-radius:50%;border:0.5px solid #ddd;background:#fff;font-size:22px;">7</button>
    <button onclick="window.pinInput('8')" style="height:72px;border-radius:50%;border:0.5px solid #ddd;background:#fff;font-size:22px;">8</button>
    <button onclick="window.pinInput('9')" style="height:72px;border-radius:50%;border:0.5px solid #ddd;background:#fff;font-size:22px;">9</button>
    <div></div>
    <button onclick="window.pinInput('0')" style="height:72px;border-radius:50%;border:0.5px solid #ddd;background:#fff;font-size:22px;">0</button>
    <button onclick="window.pinDelete()" style="height:72px;border-radius:50%;border:0.5px solid #ddd;background:#fff;font-size:18px;">⌫</button>
  </div>
</div>

<script>
const SK='envelope_v8';
const now=new Date();
function mKey(y,m){return y+'-'+String(m+1).padStart(2,'0');}
function mLabel(k){return parseInt(k.split('-')[1])+'월';}
const TODAY=mKey(now.getFullYear(),now.getMonth());
let viewKey=TODAY;
let mainTab='budget';
let activeRecordEnv='life';
let savePanelOpen=false;
let isReadonly=false;
let unlocked = false;
let currentPin = '';

const CAT_COLORS={'식당':'#D85A30','카페':'#BA7517','마트':'#1D9E75','교통':'#185FA5','쇼핑':'#534AB7','문화':'#993556','기타':'#888780'};
const CATS=Object.keys(CAT_COLORS);

function defData(){
  return{
    income:'',
    envelopes:[
      {key:'save',name:'저축',pct:50},
      {key:'life',name:'생활비',pct:30,showDaily:true},
      {key:'fun',name:'여가',pct:10},
      {key:'emer',name:'비상금',pct:10},
    ],
    fixedItems:[{id:1,name:'통신비',amount:0},{id:2,name:'OTT',amount:0},{id:3,name:'교통비',amount:0}],
    fixedIdCnt:4,
    saveGoals:[{id:1,name:'주식',pct:50},{id:2,name:'여행',pct:30},{id:3,name:'기타',pct:20}],
    goalIdCnt:4,
    spends:{life:[],fun:[]},
    spendIdCnt:1,
  };
}

function loadAll(){try{return JSON.parse(localStorage.getItem(SK)||'{}');}catch(e){return{};}}
function saveAll(all){
  localStorage.setItem(SK,JSON.stringify(all));
  document.getElementById('save-dot').classList.add('saved');
  document.getElementById('save-label').textContent='저장됨';
  saveToFirebase(all);
}

function getData(key){
  const all = loadAll();
  if(!unlocked) return defData();
  if(all[key]) return all[key];
  const keys = Object.keys(all).sort();
  const prev = keys.filter(k => k < key).pop();
  if(prev){
    const p = all[prev];
    return {
      income:'',
      envelopes: p.envelopes.map(e => ({...e})),
      fixedItems: p.fixedItems.map(f => ({...f})),
      fixedIdCnt: p.fixedIdCnt,
      saveGoals: (p.saveGoals || []).map(g => ({...g})),
      goalIdCnt: p.goalIdCnt || 4,
      spends: {life:[], fun:[]},
      spendIdCnt: 1
    };
  }
  return defData();
}

let d = defData();

function saveData(){
  if(viewKey!==TODAY || !unlocked) return;
  const incomeEl = document.getElementById('income');
  if(incomeEl) d.income = incomeEl.value;
  const all=loadAll();all[TODAY]=d;saveAll(all);
}

function formatNum(n) {
  if(!n && n !== 0) return '';
  return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

function unformatNum(s) {
  if(!s) return 0;
  return parseInt(s.toString().replace(/[^0-9]/g, '')) || 0;
}

/* ── UI 제어 ── */
window.switchMainTab = function(tab){
  mainTab=tab;
  document.getElementById('view-budget').style.display=tab==='budget'?'block':'none';
  document.getElementById('view-record').style.display=tab==='record'?'block':'none';
  document.getElementById('tab-budget').classList.toggle('active',tab==='budget');
  document.getElementById('tab-record').classList.toggle('active',tab==='record');
  if(tab==='record') renderRecordTab();
}

function buildTabs(){
  const all=loadAll();const ks=new Set(Object.keys(all));ks.add(TODAY);
  for(let i=5;i>=0;i--){const t=new Date(now.getFullYear(),now.getMonth()-i,1);ks.add(mKey(t.getFullYear(),t.getMonth()));}
  const sorted=[...ks].filter(k=>k<=TODAY).sort();
  document.getElementById('month-tabs').innerHTML=sorted.map(k=>`<button class="month-tab ${k===viewKey?'active':''}" onclick="switchMonth('${k}')">${mLabel(k)}</button>`).join('');
}

window.switchMonth = function(key){
  viewKey=key; d=getData(key); savePanelOpen=false;
  const ip=key!==TODAY;
  document.getElementById('past-banner').style.display=ip?'flex':'none';
  if(ip)document.getElementById('past-text').textContent=mLabel(key)+' 기록 (읽기 전용)';
  isReadonly=ip; setRO(ip);
  renderAll();
}

window.goCurrentMonth = function(){switchMonth(TODAY);}
function setRO(on){
  ['income','go-btn'].forEach(id=>{const el=document.getElementById(id); if(el) el.disabled=on;});
  document.querySelectorAll('.fixed-input,.icon-btn,.env-name-input,input[type=range],.leftover-input,.spend-input,.spend-add-btn, .env-amt-input').forEach(el=>el.disabled=on);
}

function renderFixed(){
  document.getElementById('fixed-list').innerHTML=d.fixedItems.map(f=>`<div class="fixed-item"><input class="fixed-input" type="text" placeholder="항목명" value="${f.name}" oninput="fName(${f.id},this.value)"/><input class="fixed-input amt" type="number" placeholder="0" value="${f.amount||''}" oninput="fAmt(${f.id},this.value)"/><button class="icon-btn" onclick="rmFixed(${f.id})">×</button></div>`).join('');
  updFSum();
}
window.addFixed = function(){d.fixedItems.push({id:d.fixedIdCnt++,name:'',amount:0});renderFixed();saveData();}
window.rmFixed = function(id){d.fixedItems=d.fixedItems.filter(f=>f.id!==id);renderFixed();calculate();saveData();}
window.fName = function(id,v){d.fixedItems.find(f=>f.id===id).name=v;saveData();}
window.fAmt = function(id,v){d.fixedItems.find(f=>f.id===id).amount=parseInt(v)||0;updFSum();calculate();saveData();}
function updFSum(){const s=d.fixedItems.reduce((a,f)=>a+(f.amount||0),0);document.getElementById('fixed-sum').textContent='합계 '+formatNum(s)+'원';}

function renderEnvelopes(){
  document.getElementById('envelopes').innerHTML=d.envelopes.map((e,i)=>`
    <div class="envelope" id="env-${e.key}" style="border-color:${savePanelOpen && e.key==='save' ? '#1a1a1a' : '#e0e0e0'}">
      <div class="env-flap" ${e.key==='save'?'onclick="toggleSavePanel()" style="cursor:pointer;"':''}>
        <svg viewBox="0 0 140 30" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <polygon points="0,0 140,0 70,24" fill="#fff" stroke="#e0e0e0" stroke-width="0.5"/>
          <line x1="0" y1="0" x2="70" y2="24" stroke="#e0e0e0" stroke-width="0.5"/>
          <line x1="140" y1="0" x2="70" y2="24" stroke="#e0e0e0" stroke-width="0.5"/>
        </svg>
      </div>
      <div class="env-body">
        <input class="env-name-input" type="text" value="${e.name}" onclick="event.stopPropagation()" oninput="updEnv(${i},this.value)"/>
        <div style="width:100%; display:flex; flex-direction:column; align-items:center; margin:4px 0;">
          <input class="env-amt-input" type="text" id="ea-${e.key}" value="" onclick="event.stopPropagation(); this.select();" oninput="onAmtInput('${e.key}', this)" onblur="onAmtBlur('${e.key}', this)" placeholder="—"/>
        </div>
        <div class="env-pct" id="ep-${e.key}" style="font-size:11px; color:#bbb;">${e.pct.toFixed(1)}%</div>
        ${e.showDaily?`<div class="env-daily" id="ed-${e.key}" style="font-size:10px; color:#aaa; margin-top:2px;"></div>`:''}
        ${e.key==='save'?`<div style="font-size:10px;color:#bbb;margin-top:6px;cursor:pointer;background:#f9f9f9;padding:2px 8px;border-radius:10px;" onclick="toggleSavePanel()">${savePanelOpen?'닫기 ▲':'자세히 ▼'}</div>`:''}
      </div>
    </div>`).join('');
  calculate();
}

window.updEnv = function(i,v){ d.envelopes[i].name=v; saveData(); renderRecordEnvTabs(); }

window.onAmtInput = function(key, el) {
  let rawVal = el.value.replace(/[^0-9]/g, '');
  if (rawVal === '') { el.value = ''; return; }
  el.value = formatNum(rawVal);
  const inc = parseInt(document.getElementById('income')?.value) || 0;
  const fix = d.fixedItems.reduce((s,f) => s + (f.amount||0), 0);
  const av = inc - fix;
  if (av <= 0) return;
  const targetPct = (parseInt(rawVal) / av) * 100;
  const targetEnv = d.envelopes.find(e => e.key === key);
  targetEnv.pct = Math.min(100, targetPct);
  const others = d.envelopes.filter(e => e.key !== key);
  const remainingPct = 100 - targetEnv.pct;
  const currentOtherSum = others.reduce((s, e) => s + e.pct, 0);
  if (currentOtherSum > 0) { others.forEach(e => { e.pct = (e.pct / currentOtherSum) * remainingPct; }); }
  else if (others.length > 0) { others[0].pct = remainingPct; }
  updateUIExcept(key); saveData();
}

window.onAmtBlur = function(key, el) {
  if (el.value !== '') { el.value = formatNum(unformatNum(el.value)) + "원"; } else { el.value = "—"; }
  calculate();
}

function updateUIExcept(excludeKey) {
  const inc = parseInt(document.getElementById('income')?.value) || 0;
  const fix = d.fixedItems.reduce((s,f) => s + (f.amount||0), 0);
  const av = inc - fix;
  d.envelopes.forEach(e => {
    if(document.getElementById('ep-'+e.key)) document.getElementById('ep-'+e.key).textContent = e.pct.toFixed(1) + '%';
    if(document.getElementById('sl-'+e.key)) document.getElementById('sl-'+e.key).value = e.pct;
    if(document.getElementById('sv-'+e.key)) document.getElementById('sv-'+e.key).textContent = e.pct.toFixed(1) + '%';
    if (e.key !== excludeKey) {
      const aEl = document.getElementById('ea-' + e.key);
      if (aEl) {
        const amt = Math.floor(av * (e.pct / 100));
        aEl.value = av > 0 ? formatNum(amt) + "원" : "—";
      }
    }
  });
  if (document.getElementById('total-pct')) document.getElementById('total-pct').textContent = '100.0%';
}

window.toggleSavePanel = function(){
  if(isReadonly)return;
  savePanelOpen=!savePanelOpen;
  document.getElementById('save-panel').classList.toggle('open',savePanelOpen);
  renderEnvelopes();
  if(savePanelOpen) renderGoals();
}

function renderGoals(){
  if(!d.saveGoals) d.saveGoals=defData().saveGoals;
  const saveAmtInput = document.getElementById('ea-save');
  const saveAmt = unformatNum(saveAmtInput.value);
  document.getElementById('save-total-amt').textContent = saveAmt > 0 ? formatNum(saveAmt)+'원' : '—';
  const total = d.saveGoals.reduce((s,g)=>s+g.pct, 0);
  document.getElementById('goal-list').innerHTML = d.saveGoals.map(g => {
    const amt = Math.floor(saveAmt * (g.pct/100));
    return `<div style="margin-bottom:10px;"><div style="display:grid; grid-template-columns:1fr 80px 28px; gap:8px; align-items:center;">
      <input class="fixed-input" type="text" placeholder="목표 이름" value="${g.name}" oninput="gName(${g.id},this.value)"/>
      <div style="font-size:12px; text-align:right;">${amt>0?formatNum(amt)+'원':'—'}</div>
      <button class="icon-btn" onclick="rmGoal(${g.id})">×</button>
    </div><div style="display:grid; grid-template-columns:1fr 35px; gap:10px; align-items:center;">
      <input type="range" min="0" max="100" step="1" value="${g.pct}" oninput="gSlide(${g.id},this.value)"/>
      <span style="font-size:11px; color:#bbb;">${g.pct}%</span>
    </div></div>`;
  }).join('');
}
window.gName = function(id,v){ d.saveGoals.find(g=>g.id===id).name=v; saveData(); }
window.gSlide = function(id,v){ d.saveGoals.find(g=>g.id===id).pct=parseInt(v); renderGoals(); saveData(); }
window.addGoal = function(){d.saveGoals.push({id:d.goalIdCnt++,name:'',pct:0});renderGoals();saveData();}
window.rmGoal = function(id){d.saveGoals=d.saveGoals.filter(g=>g.id!==id);renderGoals();saveData();}

function renderSliders(){
  document.getElementById('slider-rows').innerHTML=d.envelopes.map(e=>`<div class="sl-row"><span>${e.name}</span><input type="range" min="0" max="100" step="0.1" value="${e.pct}" id="sl-${e.key}" oninput="onSlide('${e.key}')"/><span id="sv-${e.key}">${e.pct.toFixed(1)}%</span></div>`).join('');
}
window.onSlide = function(key){
  const sl = document.getElementById('sl-'+key);
  const newVal = parseFloat(sl.value);
  const env = d.envelopes.find(e=>e.key===key);
  env.pct = newVal;
  const others = d.envelopes.filter(e=>e.key!==key);
  const remaining = 100 - newVal;
  const otherSum = others.reduce((s,e)=>s+e.pct,0);
  if(otherSum > 0){ others.forEach(e => e.pct = (e.pct/otherSum)*remaining); }
  else if(others.length > 0) { others[0].pct = remaining; }
  calculate(); saveData();
}

function renderLeftover(){
  document.getElementById('leftover-rows').innerHTML=d.envelopes.map(e=>`<div class="leftover-item"><span class="leftover-label">${e.name} 남은 돈</span><input class="leftover-input" type="number" id="lo-${e.key}" placeholder="0" oninput="updMSum()"/></div>`).join('');
}
window.updMSum = function(){const t=d.envelopes.reduce((s,e)=>s+(parseInt(document.getElementById('lo-'+e.key).value)||0),0);document.getElementById('merge-sum').textContent=formatNum(t)+'원';}
window.mergeLeftover = function(){
  const total=d.envelopes.reduce((s,e)=>s+(parseInt(document.getElementById('lo-'+e.key).value)||0),0);
  if(total<=0){alert('남은 금액을 입력해주세요');return;}
  const saveEnv = d.envelopes.find(e=>e.key==='save');
  const inc = parseInt(document.getElementById('income')?.value) || 0;
  const fix = d.fixedItems.reduce((s,f) => s + (f.amount||0), 0);
  const av = inc - fix;
  if(av > 0) {
    saveEnv.pct = (((av * (saveEnv.pct/100)) + total) / av) * 100;
    window.onSlide('save'); 
    d.envelopes.forEach(e=>{document.getElementById('lo-'+e.key).value='';});
    document.getElementById('merge-sum').textContent='0원';
    document.getElementById('merge-result').style.display='block';
    document.getElementById('merge-result').textContent=formatNum(total)+'원이 저축에 합산되었습니다.';
    saveData();
  }
}

window.calculate = function(excludeKey){
  const inc = parseInt(document.getElementById('income')?.value)||0;
  const fix = d.fixedItems.reduce((s,f)=>s+(f.amount||0),0);
  const av = Math.max(0,inc-fix);
  const row = document.getElementById('available-row');
  if(inc>0){row.style.display='flex';document.getElementById('available-amt').textContent=formatNum(av)+'원';}
  else row.style.display='none';
  d.envelopes.forEach(e=>{
    const amt = Math.floor(av * (e.pct / 100));
    const aEl = document.getElementById('ea-'+e.key);
    if(aEl && e.key !== excludeKey){ aEl.value = av > 0 ? formatNum(amt) + "원" : "—"; }
    if(document.getElementById('ep-'+e.key)) document.getElementById('ep-'+e.key).textContent=e.pct.toFixed(1)+'%';
    if(document.getElementById('sl-'+e.key)) document.getElementById('sl-'+e.key).value=e.pct;
    if(document.getElementById('sv-'+e.key)) document.getElementById('sv-'+e.key).textContent=e.pct.toFixed(1)+'%';
    if(e.showDaily){const dEl=document.getElementById('ed-'+e.key);if(dEl)dEl.textContent=av>0?'하루 약 '+formatNum(Math.floor(amt/30))+'원':'';}
  });
  if(document.getElementById('total-pct')) document.getElementById('total-pct').textContent = '100.0%';
}

function renderRecordTab(){
  renderRecordEnvTabs();
  const key=activeRecordEnv;
  if(!d.spends) d.spends = {life:[], fun:[]};
  if(!d.spends[key]) d.spends[key]=[];
  const inc = parseInt(document.getElementById('income')?.value)||0;
  const fix = d.fixedItems.reduce((s,f)=>s+(f.amount||0),0);
  const budget = Math.floor(Math.max(0,inc-fix) * (d.envelopes.find(e=>e.key===key)?.pct/100||0));
  const spent = d.spends[key].reduce((s,sp)=>s+sp.amount,0);
  const remaining = budget - spent;
  const pct = budget>0 ? Math.min(100, Math.round(spent/budget*100)) : 0;

  document.getElementById('record-content').innerHTML = `
    <div class="card" style="margin-bottom:12px;">
      <div class="budget-bar-wrap">
        <div class="budget-bar-labels">
          <span>예산 <strong>${formatNum(budget)}원</strong></span>
          <span class="${spent>budget?'over-label':''}"><strong>${formatNum(spent)}원 사용</strong> ${budget>0 ? '· 남은 '+formatNum(remaining)+'원' : ''}</span>
        </div>
        <div class="budget-bar-bg"><div class="budget-bar-fill ${spent>budget?'over':''}" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div class="spend-add-card">
      <div class="section-label">지출 추가</div>
      <div class="spend-row-input">
        <input class="spend-input" type="text" id="si-note-${key}" placeholder="내용 (예: 스타벅스)"/>
        <input class="spend-input" type="date" id="si-date-${key}" value="${new Date().toISOString().split('T')[0]}"/>
      </div>
      <div class="spend-row-input2">
        <select class="spend-input" id="si-cat-${key}">${CATS.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
        <input class="spend-input" type="number" id="si-amt-${key}" placeholder="금액"/>
        <button class="spend-add-btn" onclick="addSpend('${key}')">+</button>
      </div>
    </div>
    ${buildDonut(key)}
    <div class="spend-list-card">
      <div class="section-label">지출 내역</div>
      ${d.spends[key].length===0 ? '<div style="text-align:center; padding:30px; color:#ccc; font-size:13px;">내역 없음</div>' : 
        d.spends[key].slice().reverse().map(s=>`
          <div class="spend-item">
            <span class="spend-date">${s.date.slice(5)}</span>
            <div class="spend-info">
              <span class="spend-note-text">${s.note||'—'}</span>
              <span class="spend-cat-badge" style="background:${CAT_COLORS[s.cat]}15; color:${CAT_COLORS[s.cat]}">${s.cat}</span>
            </div>
            <span class="spend-amount">${formatNum(s.amount)}원</span>
            <button class="icon-btn" onclick="rmSpend('${key}',${s.id})" ${isReadonly?'disabled':''}>×</button>
          </div>`).join('')}
    </div>`;
}

function renderRecordEnvTabs(){
  const envs = ['life','fun'];
  document.getElementById('record-env-tabs').innerHTML = envs.map(key=>{
    const env=d.envelopes.find(e=>e.key===key);
    return `<button class="record-env-tab ${activeRecordEnv===key?'active':''}" onclick="activeRecordEnv='${key}'; renderRecordTab();">${env?env.name:key}</button>`;
  }).join('');
}

window.addSpend = function(key){
  const note=document.getElementById('si-note-'+key).value;
  const dateVal=document.getElementById('si-date-'+key).value;
  const cat=document.getElementById('si-cat-'+key).value;
  const amt=parseInt(document.getElementById('si-amt-'+key).value)||0;
  if(amt<=0) return;
  d.spends[key].push({id:d.spendIdCnt++, date:dateVal, note, cat, amount:amt});
  saveData(); renderRecordTab();
}

window.rmSpend = function(key,id){ d.spends[key]=d.spends[key].filter(s=>s.id!==id); saveData(); renderRecordTab(); }

function buildDonut(key){
  if(!d.spends[key] || d.spends[key].length===0) return '';
  const totals={}; d.spends[key].forEach(s=>{totals[s.cat]=(totals[s.cat]||0)+s.amount;});
  const total=Object.values(totals).reduce((a,b)=>a+b,0);
  const entries=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const R=50,cx=60,cy=60,sw=20,circ=2*Math.PI*R;
  let offset=0;
  const segs=entries.map(([cat,amt])=>{
    const pct=amt/total; const da=circ*pct;
    const seg=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${CAT_COLORS[cat]}" stroke-width="${sw}" stroke-dasharray="${da} ${circ}" stroke-dashoffset="${-offset*circ}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=pct; return seg;
  }).join('');
  const legend=entries.map(([cat,amt])=>`
    <div class="legend-item">
      <span class="legend-dot" style="background:${CAT_COLORS[cat]}"></span>
      <span style="flex:1">${cat}</span>
      <strong>${formatNum(amt)}원</strong>
      <span style="color:#bbb; width:35px; text-align:right; font-size:11px;">${Math.round(amt/total*100)}%</span>
    </div>`).join('');
  return `<div class="chart-card"><div class="section-label">카테고리별 지출</div><div class="chart-wrap"><svg width="120" height="120" viewBox="0 0 120 120" style="flex-shrink:0">${segs}</svg><div class="legend">${legend}</div></div></div>`;
}

function renderAll(){
  const incEl = document.getElementById('income'); if(incEl) incEl.value=d.income||'';
  renderFixed(); renderEnvelopes(); renderSliders(); renderLeftover();
}

window.resetAll = function(){if(!confirm('모든 데이터를 초기화할까요?'))return;localStorage.removeItem(SK);localStorage.removeItem('app_pin');location.reload();}

/* ── Firebase ── */
window.pinInput = function(n) { if (pinBuffer.length >= 4) return; pinBuffer += n; updateDots(); if (pinBuffer.length === 4) setTimeout(() => handlePin(), 150); };
window.pinDelete = function() { pinBuffer = pinBuffer.slice(0, -1); updateDots(); };
function updateDots() { for (let i = 0; i < 4; i++) { const dot = document.getElementById('dot-' + i); if(dot) { dot.style.background = i < pinBuffer.length ? '#1a1a1a' : ''; dot.style.borderColor = i < pinBuffer.length ? '#1a1a1a' : '#ccc'; } } }
function handlePin() {
  if (pinMode === 'verify') {
    currentPin = pinBuffer; localStorage.removeItem(SK); unlocked = true; document.getElementById('pin-screen').style.display = 'none';
    localStorage.setItem('app_pin', currentPin); loadFromFirebase(); pinBuffer = ''; updateDots();
  } else if (pinMode === 'set') {
    pinFirst = pinBuffer; pinBuffer = ''; updateDots(); pinMode = 'confirm'; document.getElementById('pin-title').textContent = 'PIN 확인 (한 번 더)';
  } else if (pinMode === 'confirm') {
    if (pinBuffer === pinFirst) {
      currentPin = pinBuffer; localStorage.setItem('app_pin', currentPin); localStorage.removeItem(SK); unlocked = true; document.getElementById('pin-screen').style.display = 'none';
      loadFromFirebase();
    } else {
      document.getElementById('pin-error').textContent = 'PIN이 일치하지 않아요'; pinBuffer = ''; pinFirst = ''; pinMode = 'set'; updateDots(); document.getElementById('pin-title').textContent = 'PIN 설정 (4자리)';
    }
  }
}
async function loadFromFirebase() {
  if (!window._dbReady || !currentPin) { window.addEventListener('db-ready', loadFromFirebase, { once: true }); return; }
  try {
    const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const snap = await getDoc(doc(window._db, 'users', 'pin_' + currentPin));
    if (snap.exists()) { localStorage.setItem(SK, JSON.stringify(snap.data())); } else { localStorage.setItem(SK, JSON.stringify({})); }
    unlocked = true; d = getData(viewKey); renderAll();
  } catch(e) { console.log('Firebase load error', e); }
}
async function saveToFirebase(all) {
  if (!window._dbReady || !unlocked || !currentPin) return;
  try {
    const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    await setDoc(doc(window._db, 'users', 'pin_' + currentPin), all);
  } catch(e) { console.log('Firebase save error', e); }
}
function initApp() {
  unlocked = false; const screen = document.getElementById('pin-screen'); if(screen) screen.style.display = 'flex';
  pinMode = 'verify'; document.getElementById('pin-title').textContent = 'PIN 입력';
  const savedPin = localStorage.getItem('app_pin'); if (!savedPin) { pinMode = 'set'; document.getElementById('pin-title').textContent = 'PIN 설정 (4자리)'; }
}
let pinBuffer = ''; let pinMode = 'verify'; let pinFirst = '';
buildTabs(); initApp();
</script>
